<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">我的话可以变成画</title>
  <desc id="desc">孩子说出想象中的月亮机器人，AI 把文字变成彩色画面。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8fbff"/>
      <stop offset="46%" stop-color="#fff7df"/>
      <stop offset="100%" stop-color="#ffe9f1"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#274a8a"/>
      <stop offset="100%" stop-color="#8d61d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#4b5b7a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <text x="600" y="88" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="54" font-weight="800" fill="#26334f">我的话可以变成画</text>
  <text x="600" y="142" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#59627a">我说清楚一点，AI 就更懂我的想象</text>
