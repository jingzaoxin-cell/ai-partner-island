      function currentGuideSpeechText() {
        const level = currentLevel();
        const flavor = currentFlavor(level.id);
        const note = state.notes[level.id] || "";
        const done = Boolean(state.completed[level.id]);
        const current = done ? 4 : guideStepIndex(level.id);
        const step = guideStepsFor(level, flavor, note, done)[current];
        return [
          `第 ${level.id} 关，${level.title}。`,
          level.story,
          `${toolContext().spriteName}说：${flavor.companion}`,
          `现在这一步是：${step.title}。${step.text}`,
          `小任务：${step.action}`
        ].join(" ");
      }

      function speakText(text) {
        if (!("speechSynthesis" in window)) {
          setVoiceStatus("这个浏览器暂时不能朗读，可以请家长读给孩子听。");
          showToast("当前浏览器不支持语音朗读。");
          return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "zh-CN";
        utterance.rate = 0.92;
        utterance.pitch = 1.12;
        utterance.onstart = () => setVoiceStatus("小精灵正在读给你听。");
        utterance.onend = () => setVoiceStatus("读完啦。你可以说一句目标，或者说“下一步”。");
        utterance.onerror = () => setVoiceStatus("朗读被打断了，可以再点一次。");
        window.speechSynthesis.speak(utterance);
      }

      function appendVoiceNote(text) {
        const level = currentLevel();
        const area = document.querySelector(`[data-note="${level.id}"]`);
        const existing = (state.notes[level.id] || "").trim();
        const addition = text.trim();
        if (!addition) return;
        const next = existing ? `${existing}\n${addition}` : addition;
        state.notes[level.id] = next;
        if (area) area.value = next;
        saveState();
        setVoiceStatus(`我听懂啦：${addition}`);
        speakText(`我听懂啦。你想说的是：${addition}。现在可以继续改成自己的说法。`);
      }

      function normalizedVoiceText(text) {
        return text
          .replace(/[，。！？、,.!?]/g, "")
          .replace(/\s+/g, "")
          .toLowerCase();
      }

      function handleVoiceCommand(text) {
        const spoken = text.trim();
        const command = normalizedVoiceText(spoken);
        if (!spoken) return;

        if (command.includes("下一步")) {
          setGuideStep(1);
          speakText("好的，我们去下一步。");
          return;
        }
        if (command.includes("上一步")) {
          setGuideStep(-1);
          speakText("好的，回到上一步。");
          return;
        }
        if (command.includes("读故事") || command.includes("讲故事") || command.includes("读给我听")) {
          speakText(currentGuideSpeechText());
          return;
        }
        if (command.includes("去写记录") || command.includes("写记录")) {
          focusRecordBox();
          speakText("这里可以写下你的目标或成长日记。");
          return;
        }
        if (command.includes("请codex导演") || command.includes("请求codex") || command.includes("请导演") || command.includes("codex导演") || command.includes("请codex帮忙")) {
          requestDirectorDraft();
          speakText("我去请 Codex 导演准备草稿，家长先看一看。");
          return;
        }
        if (command.includes("完成本关") || command.includes("通关") || command.includes("完成任务") || command.includes("一起应用ai")) {
          completeLevel(currentLevel().id);
          speakText("我来检查成长日记，准备一起应用 AI。");
          return;
        }
        if (command.includes("打开作品展") || command.includes("作品展")) {
          openSummary();
          speakText("家庭 AI 作品展打开啦。");
          return;
        }
        if (command.includes("检测服务")) {
          checkDirector();
          speakText("我来检测本地 Codex 导演服务。");
          return;
        }

        appendVoiceNote(spoken);
      }

      async function startVoiceListening() {
        const Recognition = speechRecognitionCtor();
        if (!Recognition) {
          setVoiceStatus("这个浏览器暂时不能听语音。可以换 Chrome 或 Edge，也可以继续打字玩。");
          showToast("当前浏览器不支持语音识别。");
          return;
        }
        const ready = await prepareVoicePermission();
        if (!ready) return;

        if (recognition && isListening) {
          recognition.stop();
          return;
        }

        recognition = new Recognition();
        recognition.lang = "zh-CN";
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;
        recognition.onstart = () => {
          isListening = true;
          setVoiceStatus("我在听。可以说：我想让 AI 帮我，或者说完成任务。");
          renderStage();
        };
        recognition.onresult = event => {
          const transcript = event.results?.[0]?.[0]?.transcript || "";
          setVoiceStatus(`我听到：${transcript}`);
          handleVoiceCommand(transcript);
        };
        recognition.onerror = () => {
          setVoiceStatus("这次没有听清楚，可以靠近一点再试。");
          showToast("语音没有听清楚。");
        };
        recognition.onend = () => {
          isListening = false;
          renderStage();
        };

        try {
          recognition.start();
        } catch {
          setVoiceStatus("语音正在准备中，等一秒再点一次。");
        }
      }

      function stopVoice() {
        if (recognition && isListening) recognition.stop();
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
        isListening = false;
        setVoiceStatus("已经停下。你可以继续说话、朗读或打字。");
        renderStage();
      }

      document.addEventListener("click", event => {
        const recipeChoice = event.target.closest("[data-recipe-part]");
        if (recipeChoice) {
          updatePromptRecipe(recipeChoice.dataset.recipePart, recipeChoice.dataset.recipeValue);
          return;
        }

        const trainingBucket = event.target.closest("[data-train-example]");
        if (trainingBucket) {
          chooseTrainingExample(trainingBucket.dataset.trainExample, trainingBucket.dataset.trainLabel);
          return;
        }

        const misunderstandingChoice = event.target.closest("[data-misunderstanding-example]");
        if (misunderstandingChoice) {
          chooseMisunderstandingClue(misunderstandingChoice.dataset.misunderstandingExample, misunderstandingChoice.dataset.misunderstandingLabel);
          return;
        }

        const checkChoice = event.target.closest("[data-check-choice]");
        if (checkChoice) {
          recordCheckChoice(checkChoice.dataset.checkChoice);
          return;
        }

        const feedbackChoice = event.target.closest("[data-feedback-choice]");
        if (feedbackChoice) {
          recordFeedbackChoice(feedbackChoice.dataset.feedbackChoice);
          return;
        }

        const wishKind = event.target.closest("[data-wish-kind]");
        if (wishKind) {
          selectWishKind(wishKind.dataset.wishKind);
          return;
        }

        const storyQuest = event.target.closest("[data-story-quest]");
        if (storyQuest) {
          selectStoryQuest(storyQuest.dataset.storyQuest);
          return;
        }

        const avatarChoice = event.target.closest("[data-avatar-part]");
        if (avatarChoice) {
          updatePetAvatar(avatarChoice.dataset.avatarPart, avatarChoice.dataset.avatarValue);
          return;
        }

        const petChoice = event.target.closest("[data-pet-param]");
        if (petChoice) {
          updatePetDesign(petChoice.dataset.petParam, petChoice.dataset.petValue);
          return;
        }

        const levelButton = event.target.closest("[data-level]");
        if (levelButton) {
          selectLevel(Number(levelButton.dataset.level));
          return;
        }

        const copyButton = event.target.closest("[data-copy]");
        if (copyButton) {
          const level = currentLevel();
          const context = toolContext();
          const text = copyButton.dataset.copy === "doubao" ? level.doubao(context) : level.codex(context);
          copyText(text, copyButton.dataset.copy === "doubao" ? "已复制可选豆包接口提示词。" : "已复制 Codex 导演指令。");
          return;
        }

        const completeButton = event.target.closest("[data-complete]");
        if (completeButton) {
          completeLevel(Number(completeButton.dataset.complete));
          return;
        }

        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) return;
        const action = actionButton.dataset.action;
        if (action === "reset") resetGame();
        if (action === "toggleParentMode") toggleParentMode();
        if (action === "toggleParentAdvanced") toggleParentAdvanced();
        if (action === "openSummary") openSummary();
        if (action === "closeDialog") els.dialog.classList.remove("show");
        if (action === "copySummary" && dialogPrimaryMode === "adoptDirectorDraft") adoptDirectorDraft();
        else if (action === "copySummary") copyText(lastSummaryText || buildSummary(), lastCopyMessage);
        if (action === "export") copyText(buildSummary(), "已复制给 Codex 导演的全局进度指令。");
        if (action === "checkDirector") checkDirector();
        if (action === "requestDirector") requestDirectorDraft();
        if (action === "guidePrev") setGuideStep(-1);
        if (action === "guideNext") setGuideStep(1);
        if (action === "guideRecord") focusRecordBox();
        if (action === "toggleFloatingGuide") toggleFloatingGuide();
        if (action === "floatingGuideNext") followFloatingGuide();
        if (action === "voicePermission") prepareVoicePermission();
        if (action === "voiceListen") startVoiceListening();
        if (action === "voiceRead") speakText(currentGuideSpeechText());
        if (action === "voiceStop") stopVoice();
        if (action === "startHatching") startPetHatching();
        if (action === "directAdopt") focusPartnerSetup();
        if (action === "directWish") startGrowthWish();
        if (action === "parentHint") showParentHint();
        if (action === "communicationRecord") recordCommunicationToDiary();
        if (action === "communicationAskAi") recordCommunicationToDiary({ askAi: true });
        if (action === "storyRecord") recordStoryQuestToDiary();
        if (action === "storyAskAi") recordStoryQuestToDiary({ askAi: true });
        if (action === "wishShuffle") shuffleWishEvent();
        if (action === "wishRecord") recordWishToDiary();
        if (action === "wishAskAi") recordWishToDiary({ askAi: true });
        if (action === "curiosityShuffle") shuffleCuriosityCard();
        if (action === "curiosityRecord") recordCuriosityToDiary();
        if (action === "curiosityAskAi") recordCuriosityToDiary({ askAi: true });
        if (action === "recipeRecord") recordPromptRecipeToDiary();
        if (action === "recipeAskAi") recordPromptRecipeToDiary({ askAi: true });
        if (action === "misunderstandingRecord") recordMisunderstandingToDiary();
        if (action === "misunderstandingAskAi") recordMisunderstandingToDiary({ askAi: true });
        if (action === "trainingRecord") recordTrainingToDiary();
        if (action === "trainingAskAi") recordTrainingToDiary({ askAi: true });
        if (action === "episodeRecord") recordEpisodeToDiary();
        if (action === "episodeAskAi") recordEpisodeToDiary({ askAi: true });
      });

      document.addEventListener("input", event => {
        const petField = event.target.closest("[data-pet-field]");
        if (petField) {
          state.petDesign = { ...defaultState.petDesign, ...state.petDesign, [petField.dataset.petField]: petField.value };
          syncPetDesignNote();
          syncVisiblePetDesignSummary();
          return;
        }

        const noteTarget = event.target.closest("[data-note]");
        if (noteTarget) {
          state.notes[noteTarget.dataset.note] = noteTarget.value;
          saveState();
          renderFloatingGuide();
          return;
        }
      });

      els.playerName.addEventListener("change", event => updateProfile("playerName", event.target.value));
      els.spriteName.addEventListener("change", event => updateProfile("spriteName", event.target.value));
      els.petName.addEventListener("change", event => updateProfile("petName", event.target.value));
      els.dialog.addEventListener("click", event => {
        if (event.target === els.dialog) els.dialog.classList.remove("show");
      });

      render();
    </script>
  </body>
</html>
