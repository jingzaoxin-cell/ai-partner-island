<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI伙伴岛 - 家庭协作闯关游戏</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23eaf4ff'/%3E%3Cpath d='M32 8l6 15 16 2-12 10 4 16-14-9-14 9 4-16-12-10 16-2z' fill='%2363a0ff'/%3E%3C/svg%3E" />
    <style>
      :root {
        --ink: #25324d;
        --muted: #63718d;
        --bg: #f4fbff;
        --surface: rgba(255, 255, 255, 0.86);
        --surface-strong: #ffffff;
        --line: rgba(90, 123, 168, 0.24);
        --blue: #63a0ff;
        --blue-soft: #eaf4ff;
        --mint: #47c7a4;
        --mint-soft: #e9fff6;
        --sun: #ffd96d;
        --sun-soft: #fff8dc;
        --coral: #ff8f7d;
        --pink-soft: #fff1f3;
        --violet: #b49cff;
        --violet-soft: #f4f0ff;
        --shadow: 0 18px 48px rgba(55, 75, 106, 0.14);
        --radius: 24px;
        font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 10% 0%, rgba(255, 217, 109, 0.38), transparent 28rem),
          radial-gradient(circle at 90% 4%, rgba(71, 199, 164, 0.28), transparent 30rem),
          linear-gradient(180deg, #f5fbff 0%, #fff8ed 50%, #f7f3ff 100%);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.56;
      }

      .app {
        width: min(1240px, calc(100% - 28px));
        margin: 0 auto;
        padding: 22px 0 54px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .mark {
        display: grid;
        width: 46px;
        height: 46px;
        place-items: center;
        border-radius: 16px;
        background: #fff;
        box-shadow: var(--shadow);
        color: #385f9d;
        font-size: 25px;
        font-weight: 900;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 38px);
        line-height: 1.08;
      }

      .brand p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 15px;
        font-weight: 800;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 15px;
        border: 2px solid rgba(99, 160, 255, 0.28);
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        font-weight: 900;
        box-shadow: 0 10px 24px rgba(57, 83, 120, 0.11);
        text-decoration: none;
      }

      .button.primary {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      .button.sun {
        background: var(--sun);
        border-color: rgba(255, 191, 72, 0.65);
      }

      .parent-only {
        display: none !important;
      }

      body.parent-mode .parent-only {
        display: revert !important;
      }

      .parent-advanced {
        display: none !important;
      }

      body.parent-mode .parent-advanced {
        display: none !important;
      }

      body.parent-mode.parent-advanced-mode .parent-advanced {
        display: revert !important;
      }

      body:not(.parent-mode) .map {
        display: none;
      }

      body.parent-mode:not(.parent-advanced-mode) .map {
        display: none;
      }

      .mode-chip {
        min-height: 42px;
        padding: 0 14px;
        border: 2px solid rgba(71, 199, 164, 0.34);
        border-radius: 999px;
        background: var(--mint-soft);
        color: #2f8f78;
        font-weight: 950;
      }

      body.parent-mode .mode-chip {
        border-color: rgba(99, 160, 255, 0.36);
        background: var(--blue-soft);
        color: #385f9d;
      }

      .button:focus-visible,
      input:focus-visible,
      textarea:focus-visible {
        outline: 4px solid rgba(99, 160, 255, 0.35);
        outline-offset: 3px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(250px, 320px) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .sidebar,
      .stage,
      .modal {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .sidebar {
        position: sticky;
        top: 16px;
        max-height: calc(100vh - 32px);
        max-height: calc(100dvh - 32px);
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 18px;
        scrollbar-gutter: stable;
      }

      .profile {
        display: grid;
        gap: 10px;
        margin-bottom: 16px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
      }

      .field input {
        width: 100%;
        min-height: 42px;
        padding: 0 13px;
        border: 2px solid rgba(99, 160, 255, 0.22);
        border-radius: 14px;
        background: #fff;
        color: var(--ink);
        font-weight: 850;
      }

      .pet-card {
        position: relative;
        overflow: hidden;
        margin-bottom: 16px;
        border: 1px solid rgba(71, 199, 164, 0.34);
        border-radius: 20px;
        background: linear-gradient(135deg, var(--mint-soft), #fff);
      }

      .pet-scene {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 10px;
        align-items: center;
        padding: 14px;
      }

      .pet-face {
        position: relative;
        display: grid;
        width: 104px;
        height: 104px;
        place-items: center;
        border: 6px solid var(--pet-accent, var(--mint));
        border-radius: 34px;
        background:
          radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.86) 0 9px, transparent 10px),
          linear-gradient(145deg, var(--pet-main, #dff8ec), var(--pet-soft, #fff8dc));
        box-shadow: 0 14px 24px rgba(37, 50, 77, 0.12);
        transition: border-radius 180ms ease, transform 180ms ease, background 180ms ease;
      }

      .pet-face::before,
      .pet-face::after {
        content: "";
        position: absolute;
        top: -18px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--pet-ear-a, var(--sun));
      }

      .pet-face::before {
        left: 10px;
      }

      .pet-face::after {
        right: 10px;
        background: var(--pet-ear-b, var(--coral));
      }

      .pet-face.shape-bubble {
        border-radius: 50%;
      }

      .pet-face.shape-star {
        border-radius: 32px 46px 30px 48px;
        transform: rotate(-2deg);
      }

      .pet-face.shape-cat {
        border-radius: 38px 38px 30px 30px;
      }

      .pet-face.shape-cat::before,
      .pet-face.shape-cat::after {
        top: -20px;
        width: 30px;
        height: 30px;
        border-radius: 10px 10px 4px 10px;
        transform: rotate(45deg);
      }

      .pet-face.shape-cat::before {
        left: 12px;
      }

      .pet-face.shape-cat::after {
        right: 12px;
        transform: rotate(45deg);
      }

      .pet-face.shape-spark {
        border-radius: 46px 26px 46px 26px;
      }

      .pet-accessory {
        position: absolute;
        right: -6px;
        top: -12px;
        z-index: 1;
        display: grid;
        min-width: 34px;
        height: 34px;
        place-items: center;
        padding: 0 7px;
        border: 3px solid #fff;
        border-radius: 14px;
        background: var(--sun);
        color: var(--ink);
        font-size: 16px;
        font-weight: 950;
        box-shadow: 0 10px 18px rgba(37, 50, 77, 0.14);
      }

      .eyes {
        position: relative;
        width: 58px;
        height: 38px;
      }

      .eyes::before,
      .eyes::after {
        content: "";
        position: absolute;
        top: 2px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--ink);
      }

      .eyes::before {
        left: 8px;
      }

      .eyes::after {
        right: 8px;
      }

      .smile {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 34px;
        height: 18px;
        border-bottom: 5px solid var(--ink);
        border-radius: 0 0 22px 22px;
        transform: translateX(-50%);
      }

      .pet-info h2 {
        margin: 0 0 6px;
        font-size: 22px;
      }

      .pet-info p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
        font-weight: 800;
      }

      .avatar-customizer {
        display: grid;
        gap: 10px;
        padding: 0 14px 14px;
      }

      .avatar-customizer h3 {
        margin: 0;
        font-size: 16px;
      }

      .avatar-row {
        display: grid;
        gap: 7px;
      }

      .avatar-row strong {
        color: #4f6385;
        font-size: 12px;
        font-weight: 950;
      }

      .avatar-options {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 7px;
      }

      .avatar-choice {
        display: grid;
        min-height: 42px;
        place-items: center;
        padding: 6px;
        border: 2px solid rgba(99, 160, 255, 0.2);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--ink);
        font-size: 13px;
        font-weight: 950;
      }

      .avatar-choice.selected {
        border-color: rgba(71, 199, 164, 0.62);
        background: var(--mint-soft);
        box-shadow: 0 8px 16px rgba(47, 143, 120, 0.1);
      }

      .avatar-swatch {
        width: 24px;
        height: 24px;
        border: 3px solid #fff;
        border-radius: 10px;
        background: var(--swatch, var(--mint));
        box-shadow: 0 6px 12px rgba(37, 50, 77, 0.12);
      }

      .avatar-note {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.42;
        font-weight: 850;
      }

      .meters {
        display: grid;
        gap: 10px;
        padding: 0 14px 14px;
      }

      .meter label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
      }

      .bar {
        overflow: hidden;
        height: 14px;
        border-radius: 999px;
        background: rgba(91, 116, 150, 0.15);
      }

      .bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--mint), var(--blue));
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }

      .stat {
        padding: 11px 8px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
        text-align: center;
      }

      .stat strong {
        display: block;
        font-size: 22px;
      }

      .stat span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .map {
        display: grid;
        gap: 10px;
      }

      .map-button {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        gap: 10px;
        align-items: center;
        width: 100%;
        padding: 10px;
        border: 2px solid transparent;
        border-radius: 18px;
        background: #fff;
        color: var(--ink);
        text-align: left;
      }

      .map-button.active {
        border-color: var(--blue);
        background: var(--blue-soft);
      }

      .map-button.locked {
        cursor: not-allowed;
        opacity: 0.52;
      }

      .node {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 15px;
        background: var(--sun-soft);
        border: 2px solid rgba(255, 191, 72, 0.48);
        font-weight: 900;
      }

      .node.done {
        background: var(--mint-soft);
        border-color: rgba(71, 199, 164, 0.55);
      }

      .map-title {
        display: block;
        font-weight: 900;
        line-height: 1.24;
      }

      .map-subtitle {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .tag {
        justify-self: end;
        min-width: 52px;
        padding: 5px 8px;
        border-radius: 999px;
        background: rgba(99, 160, 255, 0.12);
        color: #385f9d;
        font-size: 12px;
        font-weight: 900;
        text-align: center;
      }

      .stage {
        overflow: hidden;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(244, 251, 255, 0.8)),
          radial-gradient(circle at 16% 18%, rgba(255, 217, 109, 0.18), transparent 18rem);
      }

      .opening-path {
        display: grid;
        grid-template-columns: minmax(0, 0.74fr) minmax(300px, 1fr);
        gap: 14px;
        align-items: stretch;
        padding: clamp(14px, 2.4vw, 22px);
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(135deg, rgba(233, 255, 246, 0.88), rgba(255, 255, 255, 0.74));
      }

      .opening-copy {
        display: grid;
        align-content: center;
        min-width: 0;
      }

      .opening-kicker {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        margin-bottom: 8px;
        padding: 0 10px;
        border: 1px solid rgba(71, 199, 164, 0.34);
        border-radius: 999px;
        background: #fff;
        color: #2f8f78;
        font-size: 12px;
        font-weight: 950;
      }

      .opening-path h2 {
        margin: 0 0 8px;
        font-size: clamp(26px, 3.8vw, 42px);
        line-height: 1.08;
      }

      .opening-path p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.42;
        font-weight: 850;
      }

      .path-steps {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .path-step {
        display: grid;
        align-content: center;
        min-height: 64px;
        padding: 10px;
        border: 1px solid rgba(99, 160, 255, 0.2);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.82);
      }

      .path-step strong {
        display: block;
        margin-bottom: 3px;
        font-size: 14px;
        font-weight: 950;
      }

      .path-step span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        font-weight: 850;
      }

      .today-choice {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        padding: 12px;
        border: 1px solid rgba(255, 191, 72, 0.46);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 14px 34px rgba(57, 83, 120, 0.1);
      }

      .egg-scene {
        display: grid;
        min-height: 152px;
        place-items: center;
        border-radius: 20px;
        background:
          linear-gradient(180deg, #fff8dc, #e9fff6);
      }

      .pet-egg {
        position: relative;
        display: grid;
        width: 88px;
        height: 104px;
        place-items: center;
        border: 6px solid var(--mint);
        border-radius: 58% 58% 48% 48%;
        background:
          radial-gradient(circle at 34% 26%, #ffffff 0 12px, transparent 13px),
          linear-gradient(160deg, #fff, #dff8ec 58%, #fff8dc);
        box-shadow: 0 18px 32px rgba(37, 50, 77, 0.14);
      }

      .pet-egg::before,
      .pet-egg::after {
        content: "";
        position: absolute;
        bottom: 27px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--ink);
      }

      .pet-egg::before {
        left: 28px;
      }

      .pet-egg::after {
        right: 28px;
      }

      .egg-smile {
        position: absolute;
        bottom: 19px;
        width: 23px;
        height: 12px;
        border-bottom: 4px solid var(--ink);
        border-radius: 0 0 18px 18px;
      }

      .today-choice h3 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .today-choice-main {
        min-width: 0;
      }

      .today-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .today-button {
        display: grid;
        grid-template-columns: 1fr;
        gap: 7px;
        align-items: center;
        min-height: 94px;
        padding: 10px;
        border: 2px solid rgba(99, 160, 255, 0.18);
        border-radius: 17px;
        background: #fff;
        color: var(--ink);
        text-align: center;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .today-button:hover,
      .simple-action:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 24px rgba(57, 83, 120, 0.12);
      }

      .today-button.primary {
        border-color: rgba(255, 191, 72, 0.7);
        background: var(--sun-soft);
      }

      .today-icon {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        justify-self: center;
        border-radius: 13px;
        background: var(--blue-soft);
        color: #385f9d;
        font-weight: 950;
      }

      .today-button.primary .today-icon {
        background: var(--sun);
        color: var(--ink);
      }

      .today-button strong,
      .today-label,
      .today-subtitle {
        display: block;
      }

      .today-button strong {
        font-size: 15px;
        font-weight: 950;
      }

      .today-subtitle {
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
        font-weight: 850;
      }

      .level-banner {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 180px;
        gap: 14px;
        align-items: center;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
      }

      .level-drawer .level-banner {
        border: 1px solid rgba(99, 160, 255, 0.16);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.78);
      }

      .level-banner h2 {
        margin: 8px 0 7px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.08;
      }

      .level-banner .story {
        max-width: 860px;
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.48;
        font-weight: 850;
      }

      .level-banner-side {
        display: grid;
        gap: 8px;
      }

      .mini-art {
        overflow: hidden;
        border: 1px solid rgba(99, 160, 255, 0.18);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.76);
      }

      .mini-art .island-art {
        display: block;
        height: 118px;
        object-fit: cover;
      }

      .companion-mini {
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 9px;
        align-items: center;
        padding: 9px;
        border-radius: 16px;
        background: rgba(244, 240, 255, 0.82);
      }

      .companion-mini span {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 15px;
        background: #fff;
        color: #62539a;
        font-weight: 950;
      }

      .companion-mini p {
        margin: 0;
        color: #62539a;
        font-size: 13px;
        line-height: 1.35;
        font-weight: 900;
      }

      .stage-hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 20px;
        align-items: center;
        padding: clamp(20px, 4vw, 34px);
        background:
          radial-gradient(circle at 84% 20%, rgba(255, 217, 109, 0.36), transparent 14rem),
          radial-gradient(circle at 12% 76%, rgba(71, 199, 164, 0.18), transparent 16rem),
          rgba(255, 255, 255, 0.72);
      }

      .stage-hero::after {
        content: "";
        position: absolute;
        right: 26px;
        bottom: 16px;
        width: 118px;
        height: 22px;
        pointer-events: none;
        border-radius: 999px;
        background: rgba(128, 151, 184, 0.16);
        filter: blur(2px);
      }

      .kicker {
        display: inline-flex;
        margin-bottom: 12px;
        padding: 8px 12px;
        border: 1px solid rgba(99, 160, 255, 0.28);
        border-radius: 999px;
        background: #fff;
        color: #3c5d93;
        font-size: 14px;
        font-weight: 900;
      }

      .world-ribbon {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        margin: 0 0 14px;
      }

      .world-ribbon span {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 11px;
        border: 1px solid rgba(99, 160, 255, 0.24);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        color: #3c5d93;
        font-size: 13px;
        font-weight: 900;
      }

      .stage h2 {
        margin: 0 0 12px;
        font-size: clamp(32px, 5vw, 58px);

        font-size: 12px;
        font-weight: 950;
      }

      .hatch-dots {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 7px;
      }

      .hatch-dot {
        height: 12px;
        border-radius: 999px;
        background: rgba(99, 160, 255, 0.16);
      }

      .hatch-dot.on {
        background: linear-gradient(90deg, var(--mint), var(--sun));
      }

      .tool-grid {
        display: grid;
        gap: 12px;
      }

      .tool-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        padding: 14px;
      }

      .tool-card h4 {
        margin: 0 0 8px;
        font-size: 17px;
      }

      .prompt-box {
        overflow: auto;
        max-height: 162px;
        margin: 0 0 10px;
        padding: 12px;
        border-radius: 14px;
        background: #f6f9ff;
        color: #465775;
        font-size: 14px;
        line-height: 1.55;
        font-weight: 750;
        white-space: pre-wrap;
      }

      .tool-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .small-button {
        min-height: 36px;
        padding: 0 12px;
        border-radius: 999px;
        background: var(--blue-soft);
        color: #2f5c9f;
        font-size: 14px;
        font-weight: 900;
      }

      .small-button.dark {
        background: var(--ink);
        color: #fff;
      }

      .record textarea {
        width: 100%;
        min-height: 132px;
        resize: vertical;
        padding: 14px;
        border: 2px solid rgba(99, 160, 255, 0.22);
        border-radius: 18px;
        background: #fff;
        color: var(--ink);
        font-weight: 800;
        line-height: 1.5;
      }

      .complete-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
        font-weight: 800;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 22px;
        z-index: 20;
        max-width: min(520px, calc(100% - 32px));
        padding: 13px 16px;
        border-radius: 999px;
        background: var(--ink);
        color: #fff;
        box-shadow: var(--shadow);
        font-weight: 900;
        transform: translate(-50%, 140%);
        transition: transform 180ms ease;
      }

      .toast.show {
        transform: translate(-50%, 0);
      }

      .floating-guide {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 24;
        width: min(360px, calc(100% - 36px));
        color: var(--ink);
      }

      .floating-guide:not(.open) {
        width: auto;
      }

      .floating-guide-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        padding: 8px 14px 8px 9px;
        border: 2px solid rgba(71, 199, 164, 0.42);
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 16px 44px rgba(37, 50, 77, 0.18);
        color: var(--ink);
        font-size: 15px;
        font-weight: 950;
      }

      .floating-guide-mark {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        border-radius: 11px;
        background: var(--mint-soft);
        color: #2f8f78;
        font-weight: 950;
      }

      .floating-guide-card {
        overflow: hidden;
        border: 2px solid rgba(71, 199, 164, 0.36);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 18px 58px rgba(37, 50, 77, 0.2);
      }

      .floating-guide-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 12px 8px;
        border-bottom: 1px solid rgba(71, 199, 164, 0.18);
      }

      .floating-guide-title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .floating-guide-title strong,
      .floating-guide-subtitle {
        display: block;
      }

      .floating-guide-title strong {
        font-size: 15px;
        font-weight: 950;
      }

      .floating-guide-subtitle {
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .floating-guide-close {
        display: grid;
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        place-items: center;
        border-radius: 999px;
        background: var(--cloud);
        color: var(--muted);
        font-size: 13px;
        font-weight: 950;
      }

      .floating-guide-rows {
        display: grid;
        gap: 8px;
        padding: 10px 12px 12px;
      }

      .floating-guide-row {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 8px;
        align-items: start;
      }

      .floating-guide-row span {
        padding: 5px 8px;
        border-radius: 999px;
        background: var(--blue-soft);
        color: #2f5c9f;
        font-size: 12px;
        font-weight: 950;
        text-align: center;
      }

      .floating-guide-row strong {
        min-width: 0;
        color: var(--ink);
        font-size: 14px;
        line-height: 1.42;
        font-weight: 900;
      }

      .floating-guide-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        padding: 0 12px 12px;
      }

      .floating-guide-note {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        font-weight: 800;
      }

      .guide-target-pulse {
        animation: guideTargetPulse 900ms ease-out;
      }

      .summary {
        display: grid;
        gap: 12px;
      }

      .summary-row {
        padding: 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--line);
      }

      .summary-row strong {
        display: block;
        margin-bottom: 5px;
      }

      .summary-row p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
        font-weight: 750;
      }

      .exhibit-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .exhibit-stage-guide {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(94px, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }

      .exhibit-stage-guide div {
        display: grid;
        gap: 4px;
        min-height: 68px;
        padding: 10px;
        border: 1px solid rgba(71, 199, 164, 0.28);
        border-radius: 16px;
        background: #f2fff9;
      }

      .exhibit-stage-guide strong {
        color: #2f8f78;
        font-size: 13px;
        font-weight: 950;
      }

      .exhibit-stage-guide span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        font-weight: 850;
      }

      .exhibit-card {
        display: grid;
        gap: 10px;
        min-height: 252px;
        padding: 14px;
        border: 1px solid rgba(99, 160, 255, 0.22);
        border-radius: 18px;
        background:
          radial-gradient(circle at 16% 12%, rgba(255, 217, 109, 0.24), transparent 7rem),
          #fff;
      }

      .exhibit-card.empty {
        opacity: 0.68;
      }

      .exhibit-top {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .exhibit-badge {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 16px;
        background: var(--blue-soft);
        color: #385f9d;
        font-weight: 900;
      }

      .exhibit-card strong {
        display: block;
        line-height: 1.3;
      }

      .exhibit-card small {
        color: var(--muted);
        font-weight: 900;
      }

      .exhibit-note {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
        font-weight: 800;
      }

      .exhibit-role-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
        gap: 8px;
      }

      .exhibit-role {
        display: grid;
        gap: 4px;
        min-height: 76px;
        padding: 9px;
        border: 1px solid rgba(99, 160, 255, 0.18);
        border-radius: 14px;
        background: rgba(246, 250, 255, 0.92);
      }

      .exhibit-role span {
        color: #385f9d;
        font-size: 12px;
        font-weight: 950;
      }

      .exhibit-role strong {
        color: var(--ink);
        font-size: 12px;
        line-height: 1.4;
        font-weight: 850;
      }

      .exhibit-script {
        margin-top: 12px;
        padding: 14px;
        border-radius: 18px;
        background: var(--sun-soft);
        border: 1px solid rgba(255, 191, 72, 0.46);
        font-size: 16px;
        line-height: 1.55;
        font-weight: 900;
      }

      .dialog-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        place-items: center;
        padding: 18px;
        background: rgba(22, 33, 55, 0.36);
      }

      .dialog-backdrop.show {
        display: grid;
      }

      .celebration-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        place-items: center;
        padding: 18px;
        pointer-events: none;
      }

      .celebration-overlay.show {
        display: grid;
      }

      .celebration-card {
        position: relative;
        width: min(420px, 100%);
        overflow: hidden;
        padding: 20px;
        border: 2px solid rgba(71, 199, 164, 0.48);
        border-radius: 24px;
        background:
          radial-gradient(circle at 16% 18%, rgba(255, 217, 109, 0.45), transparent 7rem),
          radial-gradient(circle at 84% 22%, rgba(180, 156, 255, 0.28), transparent 8rem),
          #ffffff;
        box-shadow: 0 24px 80px rgba(37, 50, 77, 0.22);
        text-align: center;
        animation: celebrationPop 1300ms ease-out both;
      }

      .celebration-card::before,
      .celebration-card::after {
        content: "✦";
        position: absolute;
        top: 16px;
        color: var(--sun);
        font-size: 24px;
        animation: starFloat 1100ms ease-out both;
      }

      .celebration-card::before {
        left: 22px;
      }

      .celebration-card::after {
        right: 24px;
        color: var(--coral);
        animation-delay: 120ms;
      }

      .celebration-icon {
        display: grid;
        width: 76px;
        height: 76px;
        place-items: center;
        margin: 0 auto 10px;
        border: 5px solid var(--mint);
        border-radius: 26px;
        background: var(--mint-soft);
        color: #2f8f78;
        font-size: 34px;
        font-weight: 950;
      }

      .celebration-card h2 {
        margin: 0 0 8px;
        font-size: 27px;
      }

      .celebration-card p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
        font-weight: 850;
      }

      .pet-card.pet-hatch-success {
        animation: petHatchSuccess 1200ms ease-out;
      }

      .pet-card.pet-hatch-success::after {
        content: "";
        position: absolute;
        inset: -30%;
        pointer-events: none;
        background: conic-gradient(from 0deg, transparent, rgba(255, 217, 109, 0.5), transparent, rgba(71, 199, 164, 0.35), transparent);
        animation: hatchGlow 1200ms ease-out both;
      }

      .stage.task-complete-spark {
        animation: taskCompleteSpark 1100ms ease-out;
      }

      .celebration-overlay.cooperation-success .celebration-card {
        border-color: rgba(99, 160, 255, 0.44);
        background:
          radial-gradient(circle at 18% 20%, rgba(99, 160, 255, 0.25), transparent 8rem),
          radial-gradient(circle at 86% 18%, rgba(71, 199, 164, 0.22), transparent 8rem),
          #ffffff;
      }

      @keyframes celebrationPop {
        0% {
          opacity: 0;
          transform: translateY(18px) scale(0.92);
        }
        18% {
          opacity: 1;
          transform: translateY(0) scale(1.03);
        }
        72% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-10px) scale(0.98);
        }
      }

      @keyframes starFloat {
        0% {
          opacity: 0;
          transform: translateY(18px) rotate(0deg) scale(0.7);
        }
        30% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(-42px) rotate(24deg) scale(1.25);
        }
      }

      @keyframes petHatchSuccess {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        24% {
          transform: translateY(-4px) scale(1.02);
        }
        46% {
          transform: translateY(2px) scale(0.99);
        }
        68% {
          transform: translateY(-3px) scale(1.01);
        }
      }

      @keyframes hatchGlow {
        0% {
          opacity: 0;
          transform: rotate(0deg) scale(0.85);
        }
        45% {
          opacity: 0.8;
        }
        100% {
          opacity: 0;
          transform: rotate(110deg) scale(1.1);
        }
      }

      @keyframes taskCompleteSpark {
        0%,
        100% {
          box-shadow: var(--shadow);
        }
        35% {
          box-shadow: 0 0 0 6px rgba(255, 217, 109, 0.2), 0 24px 70px rgba(71, 199, 164, 0.22);
        }
      }

      @keyframes knowledgeSparkle {
        0%,
        100% {
          transform: translateY(0);
        }
        35% {
          transform: translateY(-3px);
        }
      }

      @keyframes parameterGlow {
        0%,
        100% {
          background: rgba(255, 255, 255, 0.82);
        }
        45% {
          background: var(--sun-soft);
          border-color: rgba(255, 191, 72, 0.68);
        }
      }

      @keyframes wishPop {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }

        38% {
          transform: translateY(-4px) scale(1.01);
          box-shadow: 0 20px 48px rgba(255, 191, 72, 0.18);
        }
      }

      @keyframes guideTargetPulse {
        0%,
        100% {
          outline: 0 solid rgba(71, 199, 164, 0);
          box-shadow: inherit;
        }
        34% {
          outline: 4px solid rgba(71, 199, 164, 0.32);
          box-shadow: 0 0 0 9px rgba(255, 217, 109, 0.18);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .celebration-card,
        .celebration-card::before,
        .celebration-card::after,
        .pet-card.pet-hatch-success,
        .pet-card.pet-hatch-success::after,
        .stage.task-complete-spark,
        .knowledge-card.knowledge-sparkle,
        .wish-card.wish-pop,
        .simple-adventure.wish-pop,
        .communication-card.wish-pop,
        .misunderstanding-card.wish-pop,
        .curiosity-card.wish-pop,
        .story-theater.wish-pop,
        .partner-reply-card.wish-pop,
        .pet-card.wish-pop,
        .episode-card.wish-pop,
        .knowledge-card.knowledge-sparkle .parameter-chip,
        .guide-target-pulse {
          animation-duration: 1ms;
          animation-iteration-count: 1;
        }
      }

      .modal {
        width: min(760px, 100%);
        max-height: min(780px, calc(100vh - 36px));
        overflow: auto;
        padding: 22px;

      .modal h2 {

          ? `我想让 AI 帮我设计一只${parts.join("、")}的电子宠物`

      }

      function petDesignProgress() {
        const design = currentPetDesign();
        return ["size", "color", "shape", "movement", "energy"].filter(key => design[key]).length;
      }

      function syncPetDesignNote() {
        state.notes[4] = petDesignSummary();
        saveState();
      }

      function renderGuide(level, flavor, note, done) {
        const current = done ? 4 : guideStepIndex(level.id);
        const steps = guideStepsFor(level, flavor, note, done);
        const step = steps[current];
        const dots = steps.map((_, index) => {
          const status = index < current || done ? "done" : index === current ? "active" : "";
          return `<span class="guide-dot ${status}" aria-hidden="true"></span>`;
        }).join("");
        return `
          <div class="guide-card" aria-label="游戏导引">
            <div class="guide-head">
              <div class="guide-mascot" aria-hidden="true">?</div>
              <div>
                <strong>更多玩法</strong>
                <p>想慢慢探索时，再打开这 5 步详细导引。</p>
              </div>
              <span class="guide-pill">第 ${current + 1}/5 步</span>
            </div>
            <div class="guide-track">${dots}</div>
            <div class="guide-body">
              <h3>${escapeHtml(step.title)}</h3>
              <p>${escapeHtml(step.text)}</p>
              <div class="guide-action">${escapeHtml(step.action)}</div>
            </div>
            <div class="guide-controls">
              <button class="small-button" type="button" data-action="guidePrev" ${current === 0 ? "disabled" : ""}>上一步</button>
              <button class="small-button dark" type="button" data-action="guideNext" ${current === 4 ? "disabled" : ""}>下一步</button>
              <button class="small-button" type="button" data-action="guideRecord">去写记录</button>
            </div>
          </div>
        `;
      }

      function floatingGuideContent() {
        const level = currentLevel();
        const flavor = currentFlavor(level.id);
        const note = state.notes[level.id] || "";
        const done = Boolean(state.completed[level.id]);
        const hasNote = note.trim().length > 0;
        const current = done ? 4 : guideStepIndex(level.id);
        const step = guideStepsFor(level, flavor, note, done)[current];
        let where = "点“记下愿望”";
        let finish = "写下一句“我想让 AI 帮我……”。";

        if (done) {
          where = "打开作品展";
          finish = `已获得：${level.badge}`;
        } else if (!hasNote) {
          where = current <= 1 ? "点“记下愿望”" : "打开成长工具箱";
          finish = "成长日记里有一句自己的想法。";
        } else if (current <= 2) {
          where = IS_PUBLIC_DEMO ? "点“完成冒险”" : "点“请小精灵帮我想”";
          finish = "记住：AI 先给草稿，最后由我决定。";
        } else {
          where = "点“完成冒险”";
          finish = "收集星星和徽章，解锁下一关。";
        }

        return {
          title: `第 ${level.id} 关小提示`,
          now: step.title,
          where,
          finish,
          helper: step.action,
          button: done ? "打开作品展" : "带我点下一步"
        };
      }

      function renderFloatingGuide() {

      function toggleFloatingGuide() {

      function floatingGuideTarget() {
        const level = currentLevel();
        const note = (state.notes[level.id] || "").trim();
        const done = Boolean(state.completed[level.id]);
        const current = done ? 4 : guideStepIndex(level.id);

        if (done) {
          return {
            kind: "summary",
            message: "作品展里可以看到你和 AI 一起完成的作品。"
          };
        }

        if (!note) {
          if (current <= 1) {
            return {
              selector: "[data-action=\"wishRecord\"]",
              message: "先点“记下愿望”，把一句想法放进成长日记。"
            };
          }
          return {
            drawer: "tools",
            selector: `[data-note="${level.id}"]`,
            message: "先在成长日记里写一句自己的目标。"
          };
        }

        if (current <= 2) {
          if (IS_PUBLIC_DEMO) {
            return {
              selector: `[data-complete="${level.id}"]`,
              minGuideStep: 3,
              message: "在线试玩版先完成冒险；本地版可以请 AI 给草稿。"
            };

          return {
            drawer: "play",
            selector: "[data-action=\"requestDirector\"]",
            message: "可以请小精灵先想一版，家长看过后再采用。"
          };
        }

        return {
          selector: `[data-complete="${level.id}"]`,
          minGuideStep: 4,
          message: "愿望写好了，现在可以完成冒险，收集徽章。"
        };

      function scrollToGuideTarget(selector) {
        const target = selector ? document.querySelector(selector) : null;
        const card = target || els.stage;
        if (!card) return;
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        card.classList.remove("guide-target-pulse");
        void card.offsetWidth;
        card.classList.add("guide-target-pulse");
        window.setTimeout(() => card.classList.remove("guide-target-pulse"), 950);

        const focusTarget = card.matches("button, textarea, input, summary")
          ? card
          : card.querySelector("button:not([disabled]), textarea, input, summary");
        if (focusTarget) {
          try {
            focusTarget.focus({ preventScroll: true });
          } catch {
            focusTarget.focus();
          }
        }
      }

      function followFloatingGuide() {
        const level = currentLevel();
        const target = floatingGuideTarget();
        state.helperOpen = true;
        if (Number.isFinite(target.minGuideStep)) {
          state.guideSteps = state.guideSteps || {};
          state.guideSteps[level.id] = Math.max(guideStepIndex(level.id), target.minGuideStep);
        }
        saveState();

        if (target.kind === "summary") {
          renderFloatingGuide();
          openSummary();
          showToast(target.message);
          return;
        }

        renderStage();
        if (target.drawer) openStageDrawer(target.drawer);
        window.setTimeout(() => scrollToGuideTarget(target.selector), 80);
        showToast(target.message);
      }

      async function copyText(text, message) {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            const area = document.createElement("textarea");
            area.value = text;
            area.setAttribute("readonly", "");
            area.style.position = "fixed";
            area.style.left = "-9999px";
            document.body.appendChild(area);
            area.select();
            document.execCommand("copy");
            area.remove();
          }
          showToast(message);
        } catch {
          showManualCopy(text);
        }
      }

      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 1900);
      }

      function pulseElement(selector, className, duration = 1300) {
        const target = document.querySelector(selector);
        if (!target) return;
        target.classList.remove(className);
        window.requestAnimationFrame(() => {
          target.classList.add(className);
          window.setTimeout(() => target.classList.remove(className), duration);
        });
      }

      function triggerCelebration({ title, text, icon = "✦", mode = "" }) {
        if (!els.celebration) return;
        els.celebration.className = `celebration-overlay show ${mode}`.trim();
        els.celebration.innerHTML = `
          <section class="celebration-card" aria-label="${escapeHtml(title)}">
            <div class="celebration-icon" aria-hidden="true">${escapeHtml(icon)}</div>
            <h2>${escapeHtml(title)}</h2>
            <p>${escapeHtml(text)}</p>
          </section>
        `;
        window.clearTimeout(triggerCelebration.timer);
        triggerCelebration.timer = window.setTimeout(() => {
          els.celebration.className = "celebration-overlay";
          els.celebration.innerHTML = "";
        }, 1350);
      }

        pulseElement(".stage", "task-complete-spark");
        pulseElement(".knowledge-card", "knowledge-sparkle");

        triggerCelebration({
          title: isPetHatch ? "豆豆孵化成功！" : "任务达成！",
          text: isPetHatch
            ? "你用尺寸、颜色、形状把想法说清楚了。获得知识宝石：数学 + 表达 + 配合。"

          icon: isPetHatch ? "蛋" : "知"

      function showManualCopy(text) {
        lastSummaryText = text;
        lastCopyMessage = "内容已复制。";
        dialogPrimaryMode = "copy";
        els.dialogTitle.textContent = "手动复制";
        els.dialogPrimary.textContent = "复制内容";
        els.dialogContent.innerHTML = `
          <p class="hint">浏览器没有允许自动复制，可以手动选中下面内容。</p>
          <textarea readonly>${escapeHtml(text)}</textarea>
        `;
        els.dialog.classList.add("show");
      }

      function completeLevel(levelId) {
        const level = levels.find(item => item.id === levelId);
        const flavor = currentFlavor(levelId);
        const alreadyDone = Boolean(state.completed[levelId]);
        if (levelId === 4 && petDesignProgress() > 0) syncPetDesignNote();
        const note = (state.notes[levelId] || "").trim();
        if (!note && !alreadyDone) {
          showToast("先写下一点目标，再和宠物一起应用 AI。");
          return;
        }
        if (!alreadyDone) {
          state.completed[levelId] = true;
          state.stars += level.reward;
          state.unlockedLevel = Math.max(state.unlockedLevel, Math.min(levelId + 1, levels.length));
        }
        state.mood = clamp(state.mood + 8, 0, 100);
        state.curiosity = clamp(state.curiosity + 6, 0, 100);
        state.selectedLevel = Math.min(levelId + 1, state.unlockedLevel);
        setLevelWelcomePartnerReply(currentLevel());
        saveState();
        render();
        showToast(alreadyDone ? `${state.petName}抱着${flavor.artifact}又开心了一点。` : `获得${level.badge}和${flavor.artifact}，解锁新的 AI 成长能力。`);
        celebrateTaskSuccess(level, alreadyDone);
      }

      function buildSummary() {
        const context = toolContext();
        const exhibitRows = levels.map(level => {
          const note = (state.notes[level.id] || "").trim();
          if (!note) return `第 ${level.id} 关《${level.title}》：还没有作品展记录。`;
          const parts = exhibitSpotlight(level, note);
          return `第 ${level.id} 关《${level.title}》作品展讲解
我做的是：${parts.made}
AI 帮我：${parts.aiHelp}
我教 AI：${parts.taught}
我检查了：${parts.checked}
我决定：${parts.decided}`;
        }).join("\n\n");
        const rows = levels.map(level => {
          const note = (state.notes[level.id] || "").trim();
          const status = state.completed[level.id] ? "已学会" : level.id <= state.unlockedLevel ? "探索中" : "未解锁";
          return `第 ${level.id} 关《${level.title}》：${status}\n成长日记：${note || "还没有记录"}`;
        }).join("\n\n");
        return `《AI伙伴岛》家庭成长日记\n小队长：${context.playerName}\nAI 小精灵：${context.spriteName}\n电子宠物：${context.petName}\n宠物形象：${context.petLook}\n星星：${state.stars}\n徽章：${completedCount()}\n\n作品展讲解：\n${exhibitRows}\n\n完整成长日记：\n${rows}\n\n请根据以上记录，帮助家长整理一份适合 8 岁孩子展示的家庭 AI 作品展发言稿。重点突出：孩子的成长愿望、AI 帮忙的部分、孩子教会 AI 的部分、孩子自己的决定、安全和判断力。`;
      }

      function setDialog(title, html, textToCopy, buttonLabel, primaryMode = "copy") {
        els.dialogTitle.textContent = title;
        els.dialogPrimary.textContent = buttonLabel;
        els.dialogContent.innerHTML = html;
        lastSummaryText = textToCopy;
        lastCopyMessage = `${buttonLabel}已复制。`;
        dialogPrimaryMode = primaryMode;
        els.dialog.classList.add("show");
      }

      function exhibitLine(level, note) {
        if (!note.trim()) return "还没有成长日记。";
        return note.trim().slice(0, 120);
      }

      function compactExhibitText(value, fallback, limit = 46) {
        const clean = String(value || fallback || "继续探索中。").replace(/\s+/g, " ").trim();
        return clean.length > limit ? `${clean.slice(0, limit)}…` : clean;
      }

      function extractLabeledNote(note, labels) {
        const lines = note.split(/\n+/).map(line => line.trim()).filter(Boolean);
        for (const label of labels) {
          const marker = label.endsWith("：") || label.endsWith(":") ? label : `${label}：`;
          const line = lines.find(item => item.includes(marker));
          if (line) return line.slice(line.indexOf(marker) + marker.length).trim();
        }
        return "";
      }

      function exhibitSpotlight(level, note) {
        const arc = currentEpisodeArc(level.id);
        return {
          made: compactExhibitText(extractLabeledNote(note, ["我做的是", "我先说愿望", "我的儿童愿望", "我想问 AI", "我想实现", "我想试的任务"]), arc.childWish),
          aiHelp: compactExhibitText(extractLabeledNote(note, ["AI 帮我", "AI 先帮我", "我请 AI 帮忙", "请 AI 帮忙"]), arc.aiCan),
          taught: compactExhibitText(extractLabeledNote(note, ["我对 AI 说", "我给 AI 反馈", "我来反馈", "我教 AI", "本关参考反馈"]), arc.childTeaches),
          checked: compactExhibitText(extractLabeledNote(note, ["我的检查", "我来检查", "安全提醒", "安全小约定"]), "先检查像不像、真不真、安全不安全。"),
          decided: compactExhibitText(extractLabeledNote(note, ["我的决定", "最后我决定", "我自己决定的是"]), "我来选择、修改和决定。")
        };
      }

      function renderExhibitSpotlight(level, note) {
        const parts = exhibitSpotlight(level, note);
        const items = [
          ["我做的是", parts.made],
          ["AI 帮我", parts.aiHelp],
          ["我教 AI", parts.taught],
          ["我检查了", parts.checked],
          ["我决定", parts.decided]
        ];
        return `
          <div class="exhibit-role-grid" data-exhibit-roles="${level.id}">
            ${items.map(([label, text]) => `
              <div class="exhibit-role">
                <span>${escapeHtml(label)}</span>
                <strong>${escapeHtml(text)}</strong>
              </div>
            `).join("")}
          </div>
        `;
      }

      function syncVisibleNote() {
        const area = document.querySelector(`[data-note="${currentLevel().id}"]`);
        if (area) {
          state.notes[area.dataset.note] = area.value;
          saveState();
        }
      }

      function currentOpenStageDrawers() {
        return Array.from(document.querySelectorAll("[data-drawer][open]"))
          .map(drawer => drawer.dataset.drawer)
          .filter(Boolean);
      }

      function openStageDrawer(name) {
        const drawer = document.querySelector(`[data-drawer="${name}"]`);
        if (drawer) drawer.open = true;
      }

      function restoreOpenStageDrawers(drawers = []) {
        drawers.forEach(openStageDrawer);
      }

      function syncVisiblePetDesignSummary() {
        const summary = document.querySelector(".hatch-summary span");
        const petNote = document.querySelector('textarea[data-note="4"]');
        if (summary) summary.textContent = petDesignSummary();
        if (petNote) petNote.value = state.notes[4] || "";
      }

      function openSummary() {
        syncVisibleNote();
        const html = levels.map(level => {
          const note = (state.notes[level.id] || "").trim();
          const done = Boolean(state.completed[level.id]);
          const label = done ? level.badge : note ? "成长草稿" : "等待成长日记";
          return `
            <div class="exhibit-card ${note ? "" : "empty"}">
              <div class="exhibit-top">
                <span class="exhibit-badge">${done ? "✓" : level.id}</span>
                <div>
                  <strong>第 ${level.id} 关 · ${escapeHtml(level.title)}</strong>
                  <small>${escapeHtml(label)}</small>
                </div>
              </div>
              <p class="exhibit-note">${escapeHtml(exhibitLine(level, note))}</p>
              ${note ? renderExhibitSpotlight(level, note) : ""}
            </div>
          `;
        }).join("");
        setDialog("家庭 AI 作品展", `
          <div class="exhibit-stage-guide" aria-label="作品展讲解句式">
            <div><strong>我做的是</strong><span>我的作品、问题或愿望</span></div>
            <div><strong>AI 帮我</strong><span>整理、解释或先做一版</span></div>
            <div><strong>我教 AI</strong><span>告诉它哪里要修改</span></div>
            <div><strong>我检查了</strong><span>像不像、真不真、安全不安全</span></div>
            <div><strong>我决定</strong><span>最后选择自己的版本</span></div>
          </div>
          <div class="exhibit-grid">${html}</div>
          <div class="exhibit-script">展示句式：我做的是…… AI 帮我…… 我教 AI…… 我检查了…… 我决定的是……</div>
        `, buildSummary(), "复制作品展");
      }

      function buildDriverPayload() {
        const level = currentLevel();
        const context = toolContext();
        return {
          levelId: level.id,
          levelTitle: level.title,
          playerName: context.playerName,
          spriteName: context.spriteName,
          petName: context.petName,
          note: state.notes[level.id] || ""
        };
      }

      function formatDirectorDraft(payload) {
        const draft = payload.draft;
        return [
          `《AI伙伴岛》家长预览草稿`,
          `驱动：${payload.driver}`,
          `需要家长审批：${payload.requiresParentApproval ? "是" : "否"}`,
          "",
          `标题：${draft.title}`,
          `故事：${draft.story}`,
          "",
          "孩子任务：",
          ...draft.childMission.map((item, index) => `${index + 1}. ${item}`),
          "",
          "家长引导：",
          ...draft.parentGuide.map((item, index) => `${index + 1}. ${item}`),
          "",
          `奖励建议：${draft.rewardIdea}`,
          "",
          "安全检查：",
          ...payload.safetyChecklist.map((item, index) => `${index + 1}. ${item}`)
        ].join("\n");
      }

      function formatDirectorNote(payload) {
        const draft = payload.draft;
        return [
          `我采用了 Codex 导演草稿：${draft.title}`,
          `故事点子：${draft.story}`,
          `我想试的任务：${draft.childMission[0] || "继续完善我的作品。"}`,
          `我自己要决定的是：选喜欢的内容，再改成自己的说法。`
        ].join("\n");
      }

      function openDirectorPreview(payload) {
        const draft = payload.draft;
        pendingDirectorNote = formatDirectorNote(payload);
        const html = `
          <div class="summary">
            <div class="summary-row">
              <strong>${escapeHtml(draft.title)}</strong>
              <p>${escapeHtml(draft.story)}</p>
            </div>
            <div class="summary-row">
              <strong>孩子可以玩的任务</strong>
              <ul class="task-list">
                ${draft.childMission.map((item, index) => `<li><span class="mini-dot">${index + 1}</span><span>${escapeHtml(item)}</span></li>`).join("")}
              </ul>
            </div>
            <div class="summary-row">
              <strong>家长预览重点</strong>
              <ul class="task-list">
                ${draft.parentGuide.map((item, index) => `<li><span class="mini-dot">${index + 1}</span><span>${escapeHtml(item)}</span></li>`).join("")}
              </ul>
            </div>
            <div class="summary-row">
              <strong>安全检查</strong>
              <ul class="task-list">
                ${payload.safetyChecklist.map((item, index) => `<li><span class="mini-dot">${index + 1}</span><span>${escapeHtml(item)}</span></li>`).join("")}
              </ul>
            </div>
          </div>
          <p class="learning">${escapeHtml(draft.rewardIdea)}</p>
        `;
        setDialog("家长预览：Codex 导演草稿", html, formatDirectorDraft(payload), "采用到成长日记", "adoptDirectorDraft");
      }

      function adoptDirectorDraft() {
        const level = currentLevel();
        const existing = (state.notes[level.id] || "").trim();
        const addition = pendingDirectorNote.trim();
        if (!addition) {
          showToast("还没有可以采用的导演草稿。");
          return;
        }
        state.notes[level.id] = existing ? `${existing}\n\n${addition}` : addition;
        state.guideSteps = state.guideSteps || {};
        state.guideSteps[level.id] = Math.max(guideStepIndex(level.id), 3);
        saveState();
        els.dialog.classList.remove("show");
        render();
        showToast("已采用到成长日记，孩子可以继续修改。");
        celebrateCooperation();
        window.setTimeout(focusRecordBox, 120);
      }

      async function fetchWithTimeout(url, options = {}) {
        const controller = new AbortController();
        const timer = window.setTimeout(() => controller.abort(), 1800);
        try {
          return await fetch(url, { ...options, signal: controller.signal });
        } finally {
          window.clearTimeout(timer);
        }
      }

      async function checkDirector(showReadyToast = true) {
        if (IS_PUBLIC_DEMO) {
          driverStatusText = "在线试玩：基础关卡可玩，AI 草稿需要本地服务";
          if (showReadyToast) showToast("在线试玩版先玩基础关卡；完整 AI 草稿请用本地服务。");
          renderStage();
          return;
        }
        try {
          const response = await fetchWithTimeout(`${DRIVER_BASE_URL}/health`);
          const body = await response.json();
          if (!response.ok || !body.ok) throw new Error(body.message || "服务没有准备好。");
          driverStatusText = `已连接：${body.driver}`;
          if (showReadyToast) showToast("本地 Codex 导演服务已连接。");
        } catch {
          driverStatusText = "未启动：先运行 ai-partner-island-server";
          showToast("还没有连接到本地 Codex 导演服务。");
        }
        renderStage();
      }

      async function requestDirectorDraft() {
        if (IS_PUBLIC_DEMO) {
          driverStatusText = "在线试玩：AI 草稿未接入云端";
          renderStage();
          showToast("在线试玩版不会请求真实 AI；完整 AI 版请启动本地导演服务。");
          return;
        }
        if (directorBusy) return;
        directorBusy = true;
        driverStatusText = "生成草稿中";
        renderStage();
        try {
          const response = await fetchWithTimeout(`${DRIVER_BASE_URL}/api/codex/level-draft`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(buildDriverPayload())
          });
          const body = await response.json();
          if (!response.ok || !body.ok) throw new Error(body.message || "草稿生成失败。");
          driverStatusText = "草稿已返回，等待家长预览";
          openDirectorPreview(body);
          showToast("Codex 导演草稿已送到家长预览。");
        } catch {
          driverStatusText = "未启动：先运行 ai-partner-island-server";
          showToast("请求失败：请先启动本地导演服务。");
        } finally {
          directorBusy = false;
          renderStage();
        }
      }

      function resetGame() {
        if (!window.confirm("确定要重置 AI伙伴岛进度吗？这会清空本浏览器里的记录。")) return;
        state = { ...defaultState };
        saveState();
        render();
        showToast("进度已重置。");
      }

      function toggleParentMode() {
        state.parentMode = !state.parentMode;
        state.parentAdvanced = false;
        saveState();
        render();
        showToast(state.parentMode ? "家长看一眼：只显示安全提醒。" : "已回到游戏。");
      }

      function toggleParentAdvanced() {
        state.parentMode = true;
        state.parentAdvanced = !state.parentAdvanced;
        saveState();
        render();
        showToast(state.parentAdvanced ? "已展开更多设置。" : "已收起更多设置。");
      }

      function updateProfile(key, value) {
        state[key] = value.trim() || defaultState[key];
        if (key === "petName" && state.selectedLevel === 4) syncPetDesignNote();
        saveState();
        render();
      }

      function selectLevel(levelId) {
        if (levelId > state.unlockedLevel) {
          showToast("先完成前面的关卡再来这里。");
          return;
        }
        state.selectedLevel = levelId;
        setLevelWelcomePartnerReply(currentLevel());
        saveState();
        render();
      }

      function setGuideStep(delta) {
        const level = currentLevel();
        const current = guideStepIndex(level.id);
        state.guideSteps = state.guideSteps || {};
        state.guideSteps[level.id] = clamp(current + delta, 0, 4);
        saveState();
        renderStage();
      }

      function focusRecordBox() {
        const area = document.querySelector(`[data-note="${currentLevel().id}"]`);
        if (area) {
          area.focus();
          area.scrollIntoView({ behavior: "smooth", block: "center" });
        showToast("在这里写一句目标，就可以和宠物一起应用 AI。");
        }
      }

      function focusPartnerSetup() {
        const target = els.spriteName || els.petName || els.playerName;
        if (target) {
          target.focus();
          target.scrollIntoView({ behavior: "smooth", block: "center" });
        }
        showToast("先认领电子宠物向导，再让它带你认识 AI。");
        speakText("先认领电子宠物向导。它会带你看看 AI 能帮什么，能完成什么任务，也会提醒你自己做决定。");
      }

      function startPetHatching() {
        if (state.unlockedLevel < 4) {
          setPartnerReply({
            source: "pet-hatch-locked",
            title: "宠物蛋正在听你学习 AI",
            message: `${state.petName || "豆豆"}还需要三颗小知识宝石：认识 AI、判断真假、把愿望说清楚。这样孵化出来才更懂你。`,
            next: "先从当前小冒险开始：说一句愿望，让 AI 试一版，再由你来修改和决定。",
            safety: "宠物是你设计的角色；AI 帮忙整理，不能替你决定。"
          });
          saveState();
          render();
          openStageDrawer("play");
          window.setTimeout(() => {
            const card = document.querySelector(".communication-card");
            if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
          }, 80);
          showToast("宠物蛋还在充能：先完成前 3 个小冒险。");
          speakText("宠物蛋还在充能。先完成认识 AI、判断真假、把愿望说清楚三个小冒险，宠物会更懂你。");
          return;
        }
        state.unlockedLevel = Math.max(state.unlockedLevel, 4);
        state.selectedLevel = 4;
        setLevelWelcomePartnerReply(currentLevel());
        saveState();
        render();
        showToast("宠物孵化舱打开了：点选大小、颜色、形状和能力。");
        speakText("宠物孵化舱打开啦。点选大小、颜色、形状和能力，小精灵就能帮你整理宠物档案。");
      }

      function startGrowthWish() {
        openStageDrawer("play");
        window.setTimeout(() => {
          const card = document.querySelector(".communication-card");
          if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 80);
        setVoiceStatus("按 4 句练习：我想要什么、补充什么细节、请 AI 先问什么、我准备怎样反馈。");
        showToast("先用 4 句对话口诀练习和 AI 交流。");
        speakText("和 AI 交流可以这样练：我想要什么，细节是什么，请你先问我三个问题，最后我来修改。");
      }

      function updatePetDesign(key, value) {
        state.petDesign = { ...defaultState.petDesign, ...state.petDesign, [key]: value };
        state.unlockedLevel = Math.max(state.unlockedLevel, 4);
        state.selectedLevel = 4;
        syncPetDesignNote();
        render();
        showToast(`${petDesignLabels[key] || "宠物参数"}已选好，宠物蛋更亮了。`);
      }

      function updatePetAvatar(part, value) {
        if (!petAvatarOptions[part]?.some(option => option.id === value)) return;
        state.petAvatar = { ...defaultState.petAvatar, ...state.petAvatar, [part]: value };
        if (state.selectedLevel === 4) syncPetDesignNote();
        saveState();
        render();
        showToast(`${state.petName || "豆豆"}换好新形象了。`);
      }

      function selectWishKind(kindId) {
        if (!wishKinds.some(kind => kind.id === kindId)) return;
        state.wishEngine = { ...defaultState.wishEngine, ...state.wishEngine, kind: kindId };
        const kind = currentWishKind();
        const surprise = homeWishSurprise(kind);
        state.mood = clamp(state.mood + surprise.moodBoost, 0, 100);
        state.curiosity = clamp(state.curiosity + surprise.curiosityBoost, 0, 100);
        setPartnerReply({
          source: "wish-kind",
          title: `抽到愿望卡：${kind.label}`,
          message: `${state.petName || "豆豆"}把今天的方向换成了“${kind.label}”。${surprise.petLine} 宠物心情：${surprise.mood}。`,
          next: `下一步：${surprise.action}，再点“记下愿望”交给 AI 试第一版。`,
          safety: "愿望可以大胆想象；真实世界的事先问家长，不写真实姓名、学校、住址和电话。"
        });
        saveState();
        renderStage();
        renderPet();
        pulseElement(".simple-adventure", "wish-pop", 900);
        pulseElement(".partner-reply-card", "wish-pop", 900);
        pulseElement(".wish-card", "wish-pop", 900);
        pulseElement(".pet-card", "wish-pop", 900);
        showToast(`愿望卡换成：${kind.label}。`);

        state.storyQuest = { ...defaultState.storyQuest, ...state.storyQuest, [level.id]: questId };
        saveState();
        renderStage();
        pulseElement(".story-theater", "wish-pop", 900);
        showToast("小剧场剧情换好了。");
      }

      function shuffleWishEvent() {
        const wish = currentWishEngine();
        const nextIndex = (Number(wish.eventIndex || 0) + 1) % wishEvents.length;
        state.wishEngine = { ...wish, eventIndex: nextIndex };
        saveState();
        renderStage();
        pulseElement(".wish-card", "wish-pop", 900);
        showToast("新的奇遇卡来了。");
      }

      function shuffleCuriosityCard() {
        const pool = currentCuriosityPool();
        const nextIndex = (Number(pool.index || 0) + 1) % curiosityCards.length;
        state.curiosityPool = { ...pool, index: nextIndex };
        saveState();
        renderStage();
        pulseElement(".curiosity-card", "wish-pop", 900);
        showToast("新的好奇心问题卡来了。");
      }

      function recordWishToDiary({ askAi = false } = {}) {
        const level = currentLevel();
        const kind = currentWishKind();
        const existing = (state.notes[level.id] || "").trim();
        const addition = wishRecordText();
        state.notes[level.id] = existing ? `${existing}\n\n${addition}` : addition;
        state.guideSteps = state.guideSteps || {};
        state.guideSteps[level.id] = Math.max(guideStepIndex(level.id), 2);
        state.curiosity = clamp(state.curiosity + 4, 0, 100);
        setWishPartnerReply(kind);

      function speechRecognitionCtor() {
        return window.SpeechRecognition || window.webkitSpeechRecognition || null;

      function setVoicePermission(stateName, message) {
        micPermissionState = stateName;
        voicePermissionHint = message;
        const panel = document.querySelector("[data-mic-permission]");
        const hint = document.querySelector("[data-voice-permission-hint]");
        if (panel) {
          panel.classList.toggle("granted", stateName === "granted");
          panel.classList.toggle("denied", stateName === "denied");
          const label = panel.querySelector("strong");
          if (label) label.textContent = stateName === "granted" ? "已允许" : stateName === "denied" ? "未允许" : "待检查";
        }
        if (hint) hint.textContent = message;
      }

      async function queryMicrophonePermission() {
        if (!navigator.permissions?.query) return "prompt";
        try {
          const status = await navigator.permissions.query({ name: "microphone" });
          status.onchange = () => {
            const next = status.state === "granted"
              ? "麦克风权限已允许。孩子点击“点我说话”时，宠物才会开始听。"
              : status.state === "denied"
                ? "麦克风权限被浏览器拦住了。可以在地址栏设置里重新允许，或继续打字玩。"
                : "麦克风权限：家长允许后再听；网页不会偷偷录音。";
            setVoicePermission(status.state, next);
          };
          return status.state;
        } catch {
          return "prompt";
        }
      }

      async function prepareVoicePermission() {
        if (!window.isSecureContext) {
          setVoicePermission("denied", "当前地址不是安全环境。用 localhost、HTTPS，或浏览器允许的局域网地址后，才能读取笔记本麦克风。");
          setVoiceStatus("浏览器没有开放麦克风，可以继续打字玩。");
          showToast("当前地址不能读取麦克风。");
          return false;
        }
        if (!navigator.mediaDevices?.getUserMedia) {
          setVoicePermission("denied", "这个浏览器暂时没有开放麦克风接口，可以换 Chrome 或 Edge，也可以继续打字玩。");
          setVoiceStatus("当前浏览器不能读取麦克风。");
          showToast("当前浏览器不支持麦克风。");
          return false;
        }

        const permission = await queryMicrophonePermission();
        if (permission === "denied") {
          setVoicePermission("denied", "麦克风权限被浏览器拦住了。可以在地址栏设置里重新允许，或继续打字玩。");
          setVoiceStatus("麦克风还没有权限，可以请家长在浏览器里允许。");
          showToast("需要家长重新允许麦克风。");
          return false;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          stream.getTracks().forEach(track => track.stop());
          setVoicePermission("granted", "麦克风权限已允许。孩子点击“点我说话”时，宠物才会开始听。");
          setVoiceStatus("麦克风准备好了。现在可以点“点我说话”。");
          showToast("麦克风准备好了。");
          return true;
        } catch {
          setVoicePermission("denied", "这次没有获得麦克风权限。家长允许后再听，也可以继续打字玩。");
          setVoiceStatus("没有拿到麦克风权限，可以继续打字玩。");
          showToast("没有获得麦克风权限。");
          return false;
        }
      }

      function setVoiceStatus(message) {
        voiceStatusText = message;
        const status = document.querySelector("[data-voice-status]");
